<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 ホームページ編集画面｜株式会社興和塗装</title>
  <link rel="icon" href="/images/favicon.svg">
  <style>
    body { font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif !important; }
    [class*="ControlHint"], [class*="Hint"] {
      color: #1976d2 !important;
      background: #e3f2fd !important;
      padding: 6px 10px !important;
      border-radius: 6px !important;
      font-size: 0.95em !important;
    }
    [class*="ControlLabel"] { font-size: 1.05em !important; font-weight: 600 !important; }
    @media (max-width: 768px) {
      body { font-size: 16px !important; }
      [class*="ControlLabel"] { font-size: 1.1em !important; }
    }
  </style>
</head>
<body>
  <!-- Decap CMS はスクリプト読み込み後に自動でマウントされます -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
<!-- Cloudflare Web Analytics (admin-aware) -->
<script>
(function(){
  try {
    var params = new URLSearchParams(location.search);
    if (params.get('liberta_admin') === 'on') {
      localStorage.setItem('liberta_admin', 'true');
      console.log('[Liberta Admin] beacon disabled for this domain');
    }
    if (params.get('liberta_admin') === 'off') {
      localStorage.removeItem('liberta_admin');
      console.log('[Liberta Admin] beacon re-enabled for this domain');
    }
    if (localStorage.getItem('liberta_admin') === 'true') { return; }
  } catch(e) {}
  var s = document.createElement('script');
  s.defer = true;
  s.src = 'https://static.cloudflareinsights.com/beacon.min.js';
  s.setAttribute('data-cf-beacon', '{"token": "78677a880dd8474abbb5e636417bd651"}');
  document.body.appendChild(s);
})();
</script>
<!-- End Cloudflare Web Analytics -->
</body>
</html>
