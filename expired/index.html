<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>サンプル期間終了｜Liberta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
    background:
      radial-gradient(ellipse 800px 500px at 92% 0%, rgba(31, 77, 46, 0.05), transparent 70%),
      radial-gradient(ellipse 600px 500px at 0% 100%, rgba(201, 123, 91, 0.04), transparent 70%),
      linear-gradient(180deg, #FAF8F2 0%, #F7F4EC 100%);
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    color: #2A2A2A;
  }
  .card {
    max-width: 560px;
    text-align: center;
    background: #fff;
    border: 1px solid #E6E6E2;
    border-radius: 16px;
    padding: 56px 40px 48px;
    box-shadow: 0 4px 24px rgba(31, 77, 46, 0.06);
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 0.18em;
    color: #1F4D2E;
    margin-bottom: 28px;
  }
  .brand::before, .brand::after {
    content: "";
    display: inline-block;
    width: 28px;
    height: 1px;
    background: #1F4D2E;
    vertical-align: middle;
    margin: 0 10px;
    opacity: 0.5;
  }
  h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 18px;
    line-height: 1.5;
    letter-spacing: 0.02em;
  }
  p {
    font-size: 14.5px;
    line-height: 1.95;
    color: #6B6B6B;
    margin-bottom: 16px;
  }
  .cta {
    display: inline-block;
    margin-top: 24px;
    padding: 12px 28px;
    background: #1F4D2E;
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    border-radius: 6px;
    transition: background 0.2s;
  }
  .cta:hover { background: #163821; }
  .footer {
    margin-top: 32px;
    font-size: 12px;
    color: #999;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<main class="card">
  <div class="brand">Liberta</div>
  <h1>サンプル期間が終了しました</h1>
  <p>このページは Liberta が制作したホームページの <strong>無料お試しサンプル</strong> でした。<br>営業ご案内期間（30日）を過ぎたため、現在は内容を非公開にしております。</p>
  <p>ご興味をお持ちいただけた方は、Liberta公式サイトより改めてお問い合わせください。お店専用のホームページを、買い切りで制作いたします。</p>
  <a href="https://liberta.jp/" class="cta">Liberta 公式サイトへ →</a>
  <div class="footer">© Liberta — お客様の自由を、商品にする</div>
</main>
